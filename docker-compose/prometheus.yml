global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    region: 'us-east-1'
    environment: 'local'

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ecommerce-api-jmx'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):\d+'
        replacement: 'ecommerce-api'

  - job_name: 'product-service-jmx'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:9091']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'product-service'

  - job_name: 'order-service-jmx'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:9092']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'order-service'

  - job_name: 'nexus'
    metrics_path: '/service/metrics/prometheus'
    static_configs:
      - targets: ['nexus:8081']

  - job_name: 'sonarqube'
    metrics_path: '/api/monitoring/metrics'
    static_configs:
      - targets: ['sonarqube:9000']
