replicaCount: 2

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/product-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

app:
  name: product-service
  version: "1.0.0"
  port: 8080
  contextPath: /ecommerce-api

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  DB_HOST: "mysql.ecommerce.svc.cluster.local"
  DB_NAME: "ecommerce"
  DB_USER: "appuser"

secrets:
  dbPasswordSecret: "ecommerce-db-secret"
  dbPasswordKey: "password"

livenessProbe:
  initialDelaySeconds: 90
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

jmx:
  enabled: true
  port: 9090

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - product-service
          topologyKey: kubernetes.io/hostname
