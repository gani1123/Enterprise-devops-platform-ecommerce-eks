spring.application.name=order-service
server.servlet.context-path=/ecommerce-api

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:orders}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

product.service.url=http://product-service.ecommerce.svc.cluster.local:8080/ecommerce-api
